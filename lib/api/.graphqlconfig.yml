projects:
  Codegen Project:
    schemaPath: schema.graphql
    includes:
      - ../user_interface/nextjs-app/app/graphql/**/*
    excludes:
      - ./amplify/**
      - ../user_interface/nextjs-app/app/API.ts
    extensions:
      amplify:
        codeGenTarget: typescript
        generatedFileName: ../user_interface/nextjs-app/app/API.ts
        docsFilePath: ../user_interface/nextjs-app/app/graphql
        region: null
        apiId: null
        frontend: javascript
        framework: react
        maxDepth: 3
extensions:
  amplify:
    version: 3
